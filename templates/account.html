           class="w-8 h-8 object-contain">

    <a href="account.html" class="block">

        <img id="fotoid" class="object-cover w-10 rounded">
          <input 
          type="file" 
          id="fotokiezen"
          accept="image/*"
          onchange="foto(event)">

      </div>

      
    </div>

  </div>

</html>



<script>
  function foto(event) {
    const file = event.target.files[0];
    const preview = document.getElementById('fotoid');
    

    if (file) {
      preview.src = URL.createObjectURL(file);
      
      
    }
  }
</script>
