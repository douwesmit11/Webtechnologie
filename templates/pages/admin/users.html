{% extends "base.html" %}

{% block content %}
<div class="py-12 px-6">
  <div class="max-w-6xl mx-auto">

    <div class="mb-8">
      <h1 class="text-3xl font-bold text-white">Admin Panel</h1>
      <p class="text-slate-300 mt-2">Gebruikersoverzicht</p>
    </div>

    <div class="rounded-2xl border border-slate-700 shadow-xl overflow-hidden bg-slate-700">
      <div class="px-6 py-4 border-b border-slate-600 bg-slate-700">
        <h2 class="text-xl font-semibold text-white">Users</h2>
      </div>

      <div class="overflow-x-auto bg-slate-700">
        <table class="w-full text-left bg-slate-700 border-collapse">
          <thead class="bg-slate-600">
            <tr class="text-slate-100 text-sm uppercase tracking-wider">
              <th class="px-6 py-4">ID</th>
              <th class="px-6 py-4">Username</th>
              <th class="px-6 py-4">Email</th>
              <th class="px-6 py-4">Role</th>
              <th class="px-6 py-4">Created At</th>
            </tr>
          </thead>

          <tbody class="bg-slate-700 divide-y divide-slate-600">
            {% for user in users %}
            <tr class="bg-slate-700 text-slate-100 hover:bg-slate-650">
              <td class="px-6 py-4">{{ user.id }}</td>
              <td class="px-6 py-4 font-medium">{{ user.username }}</td>
              <td class="px-6 py-4">{{ user.email }}</td>
              <td class="px-6 py-4">{{ user.role }}</td>
              <td class="px-6 py-4 text-slate-200">{{ user.created_at }}</td>
            </tr>
            {% else %}
            <tr class="bg-slate-700">
              <td colspan="5" class="px-6 py-8 text-center text-slate-200">
                Geen users gevonden.
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
{% endblock %}
