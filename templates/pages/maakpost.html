{% extends "base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-3xl bg-gray-500/80 rounded-sm shadow-2xl px-10 py-12">

    <form action="/post/update" method="POST" enctype="multipart/form-data">

      <div class="flex flex-col items-center mb-10">
        <div class="w-28 h-28 rounded-full overflow-hidden border-4 border-white shadow-lg bg-gray-300 flex items-center justify-center">
          <img id="fotoid" src="" class="w-full h-full object-cover hidden">
          <span id="fotoPlaceholder" class="text-sm text-gray-800">profielfoto</span>
        </div>

        <button type="button"
          onclick="document.getElementById('fotokiezen').click()"
          class="mt-4 text-white text-sm hover:underline">
          Kies profielfoto

        </button>

        <input type="file" id="fotokiezen" name="photo" class="hidden" accept="image/*" onchange="foto(event)">

        <p class="mt-6 text-white text-2xl font-semibold text-center">
          Post bewerken
        </p>
      </div>

      <div class="w-full mb-6">
        <label class="block text-black text-xl mb-2">Titel</label>
        <input
          type="text"
          name="title"
          class="w-full h-12 bg-white px-4 text-lg outline-none border border-transparent focus:border-black shadow-sm"
        >
      </div>

      <div class="w-full mb-6">
        <label class="block text-black text-xl mb-2">Beschrijving</label>
        <input
          type="text"
          name="description"
          class="w-full h-12 bg-white px-4 text-lg outline-none border border-transparent focus:border-black shadow-sm"
        >
      </div>

      <div class="w-full mb-10">
        <label class="block text-black text-xl mb-2">Content</label>
        <textarea
          name="content"
          class="w-full h-40 bg-white px-4 py-3 text-lg outline-none border border-transparent focus:border-black shadow-sm resize-none"
        ></textarea>
      </div>

      <div class="flex justify-center">
        <button type="submit" class="bg-white text-black px-10 py-3 text-xl font-medium shadow-md hover:bg-gray-100 transition">
          Opslaan
        </button>
      </div>

    </form>
  </div>

</div>

<script>
  function foto(event) {
    const file = event.target.files[0];

    const preview = document.getElementById("fotoid");
    const placeholder = document.getElementById("fotoPlaceholder");


    if (file) {
      preview.src = URL.createObjectURL(file);
      preview.classList.remove("hidden");
      placeholder.classList.add("hidden");
    }
  }

  async function submitPost() {
    const btn = document.getElementById('submit');
    if (btn) {
      btn.disabled = true;
    }

    const formEl = document.getElementById('postForm');
    const formData = new FormData(formEl);

    const titel = formData.get('titel')?.trim();
    const description = formData.get('description')?.trim();
    const file = formData.get('image');

    
    const filePresent = file && file.size && file.size > 0;
    if (!titel || !description || !filePresent) {
      alert('Je moet titel,  beschrijving en een foto invullen.');
      if (btn) { btn.disabled = false; }
      return;
    }



</script>

{% endblock %}
