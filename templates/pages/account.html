{% extends "base.html" %}

{% block content %}

<div class="h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-2xl bg-gray-500/90 rounded-sm shadow-2xl p-10">

    <form method="POST" enctype="multipart/form-data" class="flex flex-col items-center">
      <div class="flex flex-col items-center mb-10">

        <label for="fotokiezen" class="cursor-pointer">
          <img
            id="fotoid"
            src="{{ url_for('static', filename='uploads/profile_images/' + user.profile_image) if user and user.profile_image else url_for('static', filename='images/default-avatar.png') }}"
            alt="Profielfoto"
            class="w-28 h-28 rounded-full object-cover border-4 border-white shadow-lg"
          >
        </label>

        <label for="fotokiezen" class="mt-4 text-white text-sm cursor-pointer hover:underline">
          Kies profielfoto
        </label>

        <input
          type="file"
          id="fotokiezen"
          name="foto"
          accept="image/*"
          onchange="foto(event)"
          class="hidden"
        >

        <p class="mt-6 text-white text-2xl font-semibold text-center">
          {{ user.name if user.name else "Gebruiker" }}
        </p>
      </div>

      <div class="w-full mb-6">
        <label for="username" class="block text-black text-xl mb-2">
          Gebruikersnaam
        </label>
        <input
          id="username"
          name="username"
          type="text"
          value="{{ user.username if user.username else '' }}"
          class="w-full h-12 bg-white px-4 text-lg outline-none border border-transparent focus:border-black shadow-sm"
        >
      </div>

      <div class="w-full mb-6">
        <label for="email" class="block text-black text-xl mb-2">
          Email
        </label>
        <input
          id="email"
          name="email"
          type="email"
          value="{{ user.email if user.email else '' }}"
          class="w-full h-12 bg-white px-4 text-lg outline-none border border-transparent focus:border-black shadow-sm"
        >
      </div>

      <div class="w-full mb-6">
        <label for="password" class="block text-black text-xl mb-2">
          Wachtwoord
        </label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Voer nieuw wachtwoord in"
          class="w-full h-12 bg-white px-4 text-lg outline-none border border-transparent focus:border-black shadow-sm"
        >
      </div>

      <div class="w-full mb-8">
        <label for="post_count" class="block text-black text-xl mb-2">
          Aantal post
        </label>
        <input
          id="post_count"
          name="post_count"
          type="text"
          value="{{ post_count }}"
          readonly
          class="w-full h-12 bg-white px-4 text-lg outline-none shadow-sm"
        >
      </div>

      <button
        type="submit"
        class="bg-white text-black px-8 py-3 text-xl font-medium shadow-md hover:bg-gray-100 transition"
      >
        Opslaan

      </button>
    </form>
  </div>
</div>

<script>
  function foto(event) {
    const file = event.target.files[0];
    const preview = document.getElementById('fotoid');

    if (file) {
      preview.src = URL.createObjectURL(file);
    }
  }
</script>

{% endblock %}
