{% extends "base.html" %}

{% block content %}

<div class="h-screen flex items-center justify-center">
  <form id="postForm" class="w-1/2 h-1/2 bg-gray-500 p-6" onsubmit="return false">
    <p class="text-xl ml-4">Post bewerken</p>

    <button id="submit" type="button " class="bg-green-600 cursor-pointer text-white py-2 px-4 ml-auto block mb-4" onclick="submitPost()">
      Klaar & post
    </button>

    <div class="mb-4">
      <label class="block text-center">Titel</label>
      <input type="text" name="titel" id="titel" class="w-full max-w-md mx-auto block h-10 bg-white px-2">
    </div>

    <div class="flex items-center gap-6 justify-center mt-6">

      <div class="text-center">
        <button type="button " onclick="document.getElementById('fotokiezen').click()">
          <img class="cursor-pointer w-10 mx-auto"
            src="https://static.vecteezy.com/system/resources/previews/011/912/003/non_2x/plus-sign-icon-free-png.png">
        </button>
        <p>Voeg foto toe</p>
      </div>

      <img id="fotoid" class="object-cover w-16 h-16 rounded">

      <input type="file" id="fotokiezen" name="image" class="hidden" accept="image/*" onchange="foto(event)">
    </div>

    <div class="mt-6">
      <label class="block text-center">Beschrijving</label>
      <input type="text" name="description" id="description" class="w-full max-w-md mx-auto block h-10 bg-white px-2">
    </div>

  </form>
</div>

<script>
  function foto(event) {
    const file = event.target.files[0];
    const preview = document.getElementById('fotoid');
    if (file) {
      preview.src = URL.createObjectURL(file);
    } else {
      preview.src = '';
    }
  }

  async function submitPost() {
    const btn = document.getElementById('submit');
    if (btn) {
      btn.disabled = true;
    }

    const formEl = document.getElementById('postForm');
    const formData = new FormData(formEl);

    const titel = formData.get('titel')?.trim();
    const description = formData.get('description')?.trim();
    const file = formData.get('image');

    // kijk of alle velden zijn ingevuld
    const filePresent = file && file.size && file.size > 0;
    if (!titel || !description || !filePresent) {
      alert('Je moet titel, beschrijving en een foto invullen.');
      if (btn) { btn.disabled = false; btn.textContent = 'Klaar & post'; }
      return;
    }

    //fouten opvangen


    try {
      const res = await fetch('/api/posts', {
        method: 'POST',
        body: formData
      });

      if (!res.ok) {
        const txt = await res.text();
        alert('Fout bij posten: ' + txt);
        if (btn) { btn.disabled = false; btn.textContent = 'Klaar & post'; }
        return;
      }

      const json = await res.json();
      // na posten ga naar begin.html
      if (json && json.id) {
        window.location.href = '/';
      } 
    } catch (err) {
      alert('Netwerkfout: ' + err.message);
      if (btn) { btn.disabled = false; btn.textContent = 'Klaar & post'; }
    }
  }
</script>

{% endblock %}
